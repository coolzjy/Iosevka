[buildPlans.iosevka]
family = "Iosevka"
spacing = "term"
serifs = "sans"
no-cv-ss = true
export-glyph-names = false

[buildPlans.iosevka.variants.design]
a = "single-storey-tailed"
i = "tailed"
j = "serifless"
k = "straight-serifless"
l = "tailed"
y = "cursive"
six = "closed-contour"
eight = "two-circles"
nine = "closed-contour"
asterisk = "turn-hex-low"
brace = "straight"
percent = "rings-continuous-slash"
lig-ltgteq = "slanted"
lig-neq = "more-slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"

  [buildPlans.iosevka.ligations]
  inherits = "javascript"

[buildPlans.iosevka.weights.light]
shape = 300
menu = 300
css = 300

[buildPlans.iosevka.weights.regular]
shape = 400
menu = 400
css = 400

[buildPlans.iosevka.slopes.upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.iosevka.slopes.italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"